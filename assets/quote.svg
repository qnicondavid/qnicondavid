<svg viewBox="0 0 960 72" xmlns="http://www.w3.org/2000/svg"><style>.q{font:italic 400 17px Georgia,serif;fill:#8b929c;} .n{font:600 11px "Segoe UI",sans-serif;fill:#6f8bad;letter-spacing:2.5px;}</style><text x="6" y="30" class="q">A computer would deserve to be called intelligent if it could deceive a human into believing it was human.</text><text x="954" y="58" text-anchor="end" class="n">ALAN TURING</text></svg>