name: Update streak SVG

on:
  schedule:
    - cron: "0 * * * *"   # hourly, on the hour (UTC)
  workflow_dispatch:        # allow manual runs
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate streak SVG
        env:
          # Uses your Personal Access Token (secret GH_PAT) if present so private
          # contributions are counted; otherwise falls back to the built-in token
          # (public contributions only).
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_USER: ${{ github.repository_owner }}
        run: python scripts/generate_streak.py

      - name: Generate stats SVG
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_USER: ${{ github.repository_owner }}
        run: python scripts/generate_stats.py

      - name: Generate languages SVG
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_USER: ${{ github.repository_owner }}
        run: python scripts/generate_langs.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak-rings.svg assets/stats-card.svg assets/langs-card.svg
          git diff --quiet --staged || git commit -m "chore: update profile svgs"
          git push
